name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Erlang and Elixir
        uses: ./.github/actions/setup-asdf-with-cache

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Erlang and Elixir
        uses: ./.github/actions/setup-asdf-with-cache

      - name: Cache Mix deps and build
        uses: actions/cache@v4
        with:
          key: mix-${{ hashFiles('mix.lock') }}
          restore-keys: |
            mix-
          path: |
            deps
            _build

      - name: Install dependencies
        run: mix deps.get

      - name: Clean stale test build artifacts
        run: rm -rf _build/test

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Run unit tests
        run: mix test

      - name: Start SSH test container
        run: cd test/docker && bash run.sh start

      - name: Verify SSH container is ready
        run: |
          ssh -i test/docker/.keys/test_key -p 2222 \
            -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
            fusion_test@localhost echo ok

      - name: Run external tests
        run: elixir --sname ci_test@localhost -S mix test --include external
