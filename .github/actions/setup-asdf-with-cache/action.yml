name: 'Setup asdf with cache'
description: 'Install asdf and language runtimes with intelligent caching'

runs:
  using: 'composite'
  steps:
    - name: Setup asdf infrastructure
      uses: asdf-vm/actions/setup@v4

    - name: Restore asdf plugins and installs from cache
      id: asdf-tools-cache
      uses: actions/cache@v4
      with:
        key: asdf-tools-${{ hashFiles('.tool-versions') }}
        restore-keys: |
          asdf-tools-
        path: |
          ${{ env.ASDF_DIR }}/plugins
          ${{ env.ASDF_DIR }}/installs

    - name: Install asdf tools on cache miss
      if: steps.asdf-tools-cache.outputs.cache-hit != 'true'
      uses: asdf-vm/actions/install@v4

    - name: Reshim installed tools
      shell: bash
      run: asdf reshim
